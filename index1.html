<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0d1a08;font-family:'Segoe UI',sans-serif;overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column}
#hdr{flex-shrink:0;height:48px;background:linear-gradient(90deg,#081508,#163516,#22521e,#163516,#081508);border-bottom:2.5px solid #4a9e28;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 22px rgba(74,158,40,.45)}
#hdr h1{color:#d4f0b0;font-size:.95rem;font-weight:900;letter-spacing:2.5px;text-transform:uppercase;text-shadow:0 0 14px rgba(74,158,40,.8)}
#hdr p{color:#7ab85a;font-size:.5rem;letter-spacing:1.5px;text-align:center;margin-top:2px}
#tabs{flex-shrink:0;height:30px;background:#050e05;border-bottom:1px solid #163516;display:flex;align-items:flex-end;padding:0 6px;gap:3px;overflow-x:auto}
.tab{padding:3px 11px;border-radius:5px 5px 0 0;border:1px solid #163516;border-bottom:none;color:#2e5c2e;font-size:.58rem;cursor:pointer;background:rgba(5,14,5,.9);white-space:nowrap;font-weight:700;letter-spacing:.5px;user-select:none;transition:all .15s}
.tab.on{background:rgba(74,158,40,.2);color:#b8e090;border-color:#4a9e28}
#wrap{flex:1;position:relative;overflow:hidden}
#wrap canvas{position:absolute;inset:0;width:100%;height:100%}
#btns{flex-shrink:0;height:44px;background:#050e05;border-top:1px solid #163516;display:flex;align-items:center;justify-content:center;gap:4px;padding:0 8px}
.btn{background:rgba(74,158,40,.12);border:1.5px solid #4a9e28;color:#b8e090;border-radius:5px;width:32px;height:28px;font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0;transition:all .12s}
.btn:active,.btn.on{background:rgba(74,158,40,.38)}
.sep{width:1px;height:18px;background:#163516;flex-shrink:0}
.bw{display:flex;flex-direction:column;align-items:center;gap:1px}
.bl{color:#4a9e28;font-size:.4rem;text-align:center}
#info{position:absolute;top:10px;right:10px;width:205px;background:rgba(3,10,3,.97);border:1.5px solid #4a9e28;border-radius:10px;padding:11px 12px;display:none;z-index:50;box-shadow:0 4px 22px rgba(74,158,40,.3)}
#info h3{color:#7ab85a;font-size:.78rem;font-weight:700;margin-bottom:4px}
#info p{color:#b8e090;font-size:.65rem;line-height:1.65}
#icat{display:inline-block;border:1px solid #4a9e28;color:#b8e090;font-size:.56rem;padding:2px 7px;border-radius:4px;margin-bottom:4px;background:rgba(74,158,40,.15)}
#ix{position:absolute;top:7px;right:9px;background:none;border:none;color:#2e5c2e;font-size:.9rem;cursor:pointer}
#loading{position:absolute;inset:0;background:#0d1a08;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.spin{font-size:2.5rem;animation:sp 1.8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{color:#7ab85a;font-size:.82rem;margin-top:14px;letter-spacing:3px}
.lbar{width:200px;height:3px;background:#163516;border-radius:2px;margin-top:10px;overflow:hidden}
.lfill{height:100%;width:0;background:linear-gradient(90deg,#22521e,#7ab85a);transition:width .22s}
</style>
</head>
<body>
<div id="hdr">
  <div style="text-align:center">
    <h1>🏛 Nursery Layout — 3D Architectural</h1>
    <p>Drag = Rotate &nbsp;·&nbsp; Scroll = Zoom &nbsp;·&nbsp; Right-Drag = Pan &nbsp;·&nbsp; Click = Zone Info</p>
  </div>
</div>
<div id="tabs">
  <div class="tab on" data-v="3d">3D VIEW</div>
  <div class="tab" data-v="top">PLAN VIEW</div>
  <div class="tab" data-v="side">EAST SIDE</div>
  <div class="tab" data-v="front">NORTH FRONT</div>
  <div class="tab" data-v="iso">ISO SW</div>
</div>
<div id="wrap">
  <div id="loading"><div class="spin">🌿</div><p>CONSTRUCTING NURSERY...</p><div class="lbar"><div class="lfill" id="lf"></div></div></div>
  <div id="info">
    <button id="ix">✕</button>
    <div id="icat"></div>

    <p id="idesc"></p>
  </div>
</div>
<div id="btns">
  <div class="bw"><button class="btn" id="bzi">+</button><div class="bl">IN</div></div>
  <div class="bw"><button class="btn" id="bzo">−</button><div class="bl">OUT</div></div>
  <div class="sep"></div>
  <div class="bw"><button class="btn" id="brl">◀</button><div class="bl">ROT</div></div>
  <div class="bw"><button class="btn" id="brr">▶</button><div class="bl">ROT</div></div>
  <div class="bw"><button class="btn" id="btu">▲</button><div class="bl">TILT</div></div>
  <div class="bw"><button class="btn" id="btd">▼</button><div class="bl">TILT</div></div>
  <div class="sep"></div>
  <div class="bw"><button class="btn" id="brs">⌂</button><div class="bl">RESET</div></div>
  <div class="sep"></div>
  <div class="bw"><button class="btn on" id="blb">🏷</button><div class="bl">LABELS</div></div>
  <div class="bw"><button class="btn on" id="bsun">☀</button><div class="bl">SUN</div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){"use strict";

/* ── Zone descriptions ─────────────────────────────── */
var ZD={
  carpark:  ["Carpark","Gravel-surfaced vehicle parking at the main entrance. Entry from the west (In) and exit to the east (Out)."],
  sales:    ["Sales Office","Customer-facing office where clients purchase plants, seeds and nursery products. Front-facing for easy customer access."],
  office:   ["Office","Main administrative office for day-to-day nursery management and staff coordination."],
  hall:     ["Office / Hall","Multi-purpose hall for staff meetings, training sessions, and client consultations."],
  toilet:   ["Toilet / Shower","Staff welfare block with toilets and showers. Essential worker amenity on site."],
  display:  ["Display & Dispatch","Showroom area for displaying potted plants and dispatching customer orders."],
  storage:  ["Office & Storage","Storage for records, stationery and administrative supplies adjacent to the main office."],
  potting:  ["Potting Shed","Covered workspace where workers fill pots, transplant seedlings, and prepare containers."],
  mixing:   ["Mixing Area","Preparation zone for blending potting media — combining soil, sand, compost, and manure."],
  manure:   ["Manure / Sand / Soil","Raw material stockpiles: organic manure, coarse river sand, and topsoil for media preparation."],
  watertL:  ["Water Tank (West)","Small elevated tank on the west side supplying irrigation to upper nursery zones."],
  covprop:  ["Covered Propagation","Shade-net house for propagating cuttings and germinating seeds under controlled light and humidity."],
  seedbeds: ["Seed Beds Area","Raised beds filled with fine germination media for tree and shrub seed germination."],
  growing:  ["Growing Beds","Open raised beds for growing on seedlings after germination before field transplanting."],
  openbed:  ["Open Growing Beds","Full-sun growing beds for hardening off seedlings and growing sun-tolerant species."],
  swaziland:["Swaziland / Main Beds","High-volume production beds at the lower end of the nursery for rootstock and bulk seedling production."],
  watertB:  ["Water Tank (South)","Main water storage cistern at the lowest point, gravity-feeding all growing and irrigation zones."],
  fence:    ["Live Fence + Barbed Wire","Perimeter security boundary of live hedge plants (e.g. Mauritius thorn) interplanted with barbed wire strands."],
};

/* ── Loader ─────────────────────────────────────────── */
var lf=document.getElementById("lf"),lp=0;
var lt=setInterval(function(){lp=Math.min(88,lp+13);lf.style.width=lp+"%";},110);
function go(){clearInterval(lt);lf.style.width="100%";setTimeout(function(){document.getElementById("loading").style.display="none";run();},280);}
if(window.THREE)go();else{var sc=document.createElement("script");sc.src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";sc.onload=go;document.head.appendChild(sc);}

/* ── Main scene ─────────────────────────────────────── */
function run(){
var T=window.THREE;
var wrap=document.getElementById("wrap");
var W=wrap.clientWidth,H=wrap.clientHeight;
var renderer=new T.WebGLRenderer({antialias:true});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=T.PCFSoftShadowMap;
renderer.toneMapping=T.ACESFilmicToneMapping;renderer.toneMappingExposure=1.05;
renderer.physicallyCorrectLights=true;
wrap.appendChild(renderer.domElement);

var scene=new T.Scene();
scene.background=new T.Color(0x87ceeb); // daylight sky
scene.fog=new T.Fog(0x87ceeb,100,250);

var camera=new T.PerspectiveCamera(42,W/H,0.1,400);
var VIEWS={
  "3d":   {theta:-0.55,phi:0.48,r:90,px:0,pz:0},
  "top":  {theta:-0.55,phi:0.03,r:78,px:0,pz:0},
  "side": {theta:0,phi:0.50,r:82,px:0,pz:0},
  "front":{theta:Math.PI/2,phi:0.50,r:82,px:0,pz:0},
  "iso":  {theta:Math.PI*0.8,phi:0.42,r:90,px:0,pz:0},
};
var cs={theta:-0.55,phi:0.48,r:90,px:0,pz:0};
function applyC(){camera.position.set(cs.px+cs.r*Math.sin(cs.phi)*Math.sin(cs.theta),cs.r*Math.cos(cs.phi),cs.pz+cs.r*Math.sin(cs.phi)*Math.cos(cs.theta));camera.lookAt(cs.px,1.5,cs.pz);}
applyC();

/* ── Lighting ──────────────────────────────────────── */
scene.add(new T.AmbientLight(0xd0e8c0,0.8));
var sun=new T.DirectionalLight(0xfff8e0,4.0);
sun.position.set(-35,60,20);sun.castShadow=true;
sun.shadow.mapSize.set(4096,4096);
sun.shadow.camera.left=-65;sun.shadow.camera.right=65;
sun.shadow.camera.top=75;sun.shadow.camera.bottom=-75;
sun.shadow.camera.far=280;sun.shadow.bias=-0.0003;
scene.add(sun);
scene.add(new T.HemisphereLight(0x87ceeb,0x3a6a1a,0.7));
// Fill from east
var fill=new T.DirectionalLight(0xd0f0ff,0.6);fill.position.set(40,30,-20);scene.add(fill);

/* ── Textures ──────────────────────────────────────── */
function mkT(fn,w,h){var cv=document.createElement("canvas");cv.width=w;cv.height=h;fn(cv.getContext("2d"),w,h);var t=new T.CanvasTexture(cv);t.wrapS=t.wrapT=T.RepeatWrapping;return t;}

var TX={};
TX.grass=mkT(function(c,w,h){c.fillStyle="#3a6a22";c.fillRect(0,0,w,h);for(var n=0;n<300;n++){c.fillStyle="rgba("+(18+Math.random()*22|0)+","+(60+Math.random()*40|0)+","+(8+Math.random()*14|0)+",.8)";c.fillRect(Math.random()*w,Math.random()*h,1+Math.random()*2,2+Math.random()*5);}},256,256);TX.grass.repeat.set(10,12);
TX.gravel=mkT(function(c,w,h){c.fillStyle="#9a9080";c.fillRect(0,0,w,h);for(var n=0;n<280;n++){var v=115+Math.random()*60|0;c.fillStyle="rgba("+v+","+v+","+(v-8)+",.55)";c.beginPath();c.ellipse(Math.random()*w,Math.random()*h,2+Math.random()*4,1+Math.random()*2.5,Math.random()*Math.PI,0,Math.PI*2);c.fill();}},128,128);TX.gravel.repeat.set(5,3);
TX.conc=mkT(function(c,w,h){c.fillStyle="#b0b8a0";c.fillRect(0,0,w,h);for(var n=0;n<120;n++){var v=100+Math.random()*45|0;c.fillStyle="rgba("+v+","+v+","+v+",.35)";c.fillRect(Math.random()*w,Math.random()*h,2+Math.random()*4,1);}},128,128);TX.conc.repeat.set(5,5);
TX.soil=mkT(function(c,w,h){c.fillStyle="#5c3d18";c.fillRect(0,0,w,h);for(var n=0;n<250;n++){c.fillStyle="rgba("+(55+Math.random()*35|0)+","+(22+Math.random()*18|0)+","+(4+Math.random()*8|0)+",.7)";c.beginPath();c.arc(Math.random()*w,Math.random()*h,1+Math.random()*3,0,Math.PI*2);c.fill();}},128,128);TX.soil.repeat.set(4,4);
TX.brick=mkT(function(c,w,h){c.fillStyle="#a05030";c.fillRect(0,0,w,h);var bw=24,bh=12;for(var row=0;row<h/bh;row++){for(var col=0;col<w/bw+1;col++){var bo=(row%2)*(bw/2),bx=col*bw-bo,by=row*bh;c.fillStyle="rgb("+(148+Math.random()*40|0)+","+(60+Math.random()*28|0)+","+(22+Math.random()*14|0)+")";c.fillRect(bx+1,by+1,bw-2,bh-2);}}c.fillStyle="rgba(240,220,180,.22)";for(var row2=0;row2<h/bh;row2++){c.fillRect(0,row2*bh,w,1);var bo2=(row2%2)*(bw/2);for(var col2=0;col2<w/bw+1;col2++){c.fillRect(col2*bw-bo2,row2*bh,1,bh);}}},256,128);TX.brick.repeat.set(2,2);
TX.tile=mkT(function(c,w,h){// roof tiles - terracotta
c.fillStyle="#c0522a";c.fillRect(0,0,w,h);for(var row=0;row<h/8;row++){for(var col=0;col<w/12;col++){c.fillStyle="rgba("+(155+Math.random()*30|0)+","+(60+Math.random()*20|0)+","+(28+Math.random()*12|0)+",.8)";c.fillRect(col*12+1,row*8+1,10,6);}}},128,64);TX.tile.repeat.set(4,2);
TX.metal=mkT(function(c,w,h){c.fillStyle="#8a9a8a";c.fillRect(0,0,w,h);for(var ri=0;ri<h;ri+=4){c.fillStyle="rgba(255,255,255,.08)";c.fillRect(0,ri,w,2);}},64,64);TX.metal.repeat.set(6,3);
TX.wood=mkT(function(c,w,h){c.fillStyle="#7a4520";c.fillRect(0,0,w,h);for(var n=0;n<h;n+=2+Math.random()*4){c.strokeStyle="rgba("+(50+Math.random()*22|0)+","+(20+Math.random()*12|0)+",6,.55)";c.lineWidth=0.9;c.beginPath();c.moveTo(0,n);c.lineTo(w,n+Math.random()*2-1);c.stroke();}},64,64);

function M(map,col,r,m,ex){var mt=new T.MeshStandardMaterial({roughness:r!=null?r:0.82,metalness:m||0});if(map)mt.map=map;if(col)mt.color=new T.Color(col);if(ex)Object.assign(mt,ex);return mt;}

// Pre-built shared materials
var mGrass=M(TX.grass,null,0.98,0);
var mConc=M(TX.conc,null,0.88,0);
var mBrick=M(TX.brick,null,0.88,0);
var mSoil=M(TX.soil,null,0.94,0);
var mRoofTile=M(TX.tile,null,0.85,0);
var mRoofMetal=M(TX.metal,"#7a8a72",0.55,0.18);
var mWoodBrown=M(TX.wood,"#6b3a10",0.88,0);
var mGlass=M(null,"#a0d8ef",0.05,0.15,{transparent:true,opacity:0.55});
var mSteel=M(null,"#8a9a8a",0.45,0.55);
var mDoor=M(TX.wood,"#4a2808",0.88,0);

var picks=[],labels=[],zmesh={};

/* ══════════════════════════════════════════════════════
   BUILDER FUNCTIONS
   ══════════════════════════════════════════════════════ */

function addMesh(geo,mat,px,py,pz,rx,ry,rz,shadow){
  var m=new T.Mesh(geo,mat);
  m.position.set(px,py,pz);
  if(rx)m.rotation.x=rx;if(ry)m.rotation.y=ry;if(rz)m.rotation.z=rz;
  if(shadow!==false){m.castShadow=true;m.receiveShadow=true;}
  scene.add(m);return m;
}
function BOX(w,h,d,mat,cx,cy,cz,zid){
  var m=addMesh(new T.BoxGeometry(w,h,d),mat,cx,cy+h/2,cz);
  if(zid){m.userData.zid=zid;picks.push(m);if(!zmesh[zid])zmesh[zid]=m;}
  return m;
}
function CYL(rt,rb,h,mat,cx,cy,cz,segs,zid){
  var m=addMesh(new T.CylinderGeometry(rt,rb,h,segs||16),mat,cx,cy+h/2,cz);
  if(zid){m.userData.zid=zid;picks.push(m);if(!zmesh[zid])zmesh[zid]=m;}
  return m;
}
function SPH(r,mat,cx,cy,cz){return addMesh(new T.SphereGeometry(r,10,8),mat,cx,cy,cz);}

/* ── Proper gabled roof ─────────────────────────────── */
function gabRoof(cx,topY,cz,w,d,h,mat,overhang){
  // A proper gabled roof using a custom prism geometry
  var ov=overhang||0.45;
  var W2=w/2+ov, D2=d/2+ov;
  // Build as 5 faces: 2 triangular gable ends + 2 sloped panels + optional soffit
  var verts=new Float32Array([
    // Left slope panel (4 verts → 2 tris)
    -W2, 0, -D2,   -W2, 0, D2,   0, h, -D2,
     0,  h, D2,    -W2, 0, D2,   0, h, -D2,
    // Right slope panel
     W2, 0, -D2,   0, h, -D2,   W2, 0, D2,
     0,  h, D2,    0, h, -D2,   W2, 0, D2,
    // Front gable (triangle)
    -W2, 0, -D2,   0, h, -D2,   W2, 0, -D2,
    // Back gable (triangle)
    -W2, 0,  D2,   W2, 0,  D2,  0, h,  D2,
  ]);
  var geo=new T.BufferGeometry();
  geo.setAttribute("position",new T.BufferAttribute(verts,3));
  geo.computeVertexNormals();
  var m=new T.Mesh(geo,mat);
  m.position.set(cx,topY,cz);m.castShadow=true;m.receiveShadow=true;
  scene.add(m);
  // Ridge beam
  addMesh(new T.BoxGeometry(0.16,0.16,d+ov*2),M(TX.wood,"#3a2010",0.88,0),cx,topY+h-0.08,cz);
  // Barge boards on gable ends
  var bg=new T.BoxGeometry(Math.sqrt(W2*W2+h*h),0.12,0.1),bang=Math.atan2(h,W2);
  var bb1=new T.Mesh(bg,M(null,"#3a2010",0.88,0));bb1.position.set(cx,topY+h/2,-D2);bb1.rotation.z=bang;bb1.castShadow=true;scene.add(bb1);
  var bb2=new T.Mesh(bg.clone(),M(null,"#3a2010",0.88,0));bb2.position.set(cx,topY+h/2,-D2);bb2.rotation.z=-bang;bb2.castShadow=true;scene.add(bb2);
  var bb3=new T.Mesh(bg.clone(),M(null,"#3a2010",0.88,0));bb3.position.set(cx,topY+h/2,D2);bb3.rotation.z=bang;bb3.castShadow=true;scene.add(bb3);
  var bb4=new T.Mesh(bg.clone(),M(null,"#3a2010",0.88,0));bb4.position.set(cx,topY+h/2,D2);bb4.rotation.z=-bang;bb4.castShadow=true;scene.add(bb4);
  return m;
}

/* ── Hip roof (4 slopes, more realistic) ───────────────
   cx,cz = center; topY = wall top; w,d = base footprint
   h = ridge height; ov = overhang
*/
function hipRoof(cx,topY,cz,w,d,h,mat,ov){
  ov=ov||0.4;
  var W2=w/2+ov, D2=d/2+ov, ridgeW=w*0.35;
  // 4 trapezoidal faces
  var faces=[
    // Front slope (z-)
    [-W2,0,-D2, W2,0,-D2, ridgeW,h,-D2*0.05, -ridgeW,h,-D2*0.05],
    // Back slope (z+)
    [-W2,0,D2, -ridgeW,h,D2*0.05, ridgeW,h,D2*0.05, W2,0,D2],
    // Left slope (x-)
    [-W2,0,-D2, -ridgeW,h,-D2*0.05, -ridgeW,h,D2*0.05, -W2,0,D2],
    // Right slope (x+)
    [W2,0,-D2, W2,0,D2, ridgeW,h,D2*0.05, ridgeW,h,-D2*0.05],
  ];
  faces.forEach(function(f){
    var v=new Float32Array([
      f[0],f[1],f[2], f[3],f[4],f[5], f[6],f[7],f[8],
      f[0],f[1],f[2], f[6],f[7],f[8], f[9],f[10],f[11],
    ]);
    var g=new T.BufferGeometry();g.setAttribute("position",new T.BufferAttribute(v,3));g.computeVertexNormals();
    var m=new T.Mesh(g,mat);m.position.set(cx,topY,cz);m.castShadow=true;m.receiveShadow=true;scene.add(m);
  });
  // Ridge beam
  addMesh(new T.BoxGeometry(ridgeW*2,0.14,0.14),M(TX.wood,"#3a2010",0.88,0),cx,topY+h-0.07,cz);
  // Fascia boards
  addMesh(new T.BoxGeometry(w+ov*2+0.1,0.14,0.12),M(null,"#4a2a10",0.88,0),cx,topY+0.05,-D2);
  addMesh(new T.BoxGeometry(w+ov*2+0.1,0.14,0.12),M(null,"#4a2a10",0.88,0),cx,topY+0.05, D2);
  addMesh(new T.BoxGeometry(0.12,0.14,d+ov*2+0.1),M(null,"#4a2a10",0.88,0),-W2,topY+0.05,cz);
  addMesh(new T.BoxGeometry(0.12,0.14,d+ov*2+0.1),M(null,"#4a2a10",0.88,0), W2,topY+0.05,cz);
}

/* ── Full building with walls, windows, door, roof ───── */
function building(cx,cz,w,d,wallH,roofH,zid,label,opts){
  opts=opts||{};
  var wc=opts.wallCol||"#e8ddc8";
  var wmat=opts.brick?mBrick:M(null,wc,0.88,0);
  // Foundation
  BOX(w+0.2,0.3,d+0.2,M(null,"#8a8070",0.9,0),cx,0,cz);
  // Walls as slab
  var wall=BOX(w,wallH,d,wmat,cx,0.3,cz,zid);
  // Windows — front face (south-facing, z-)
  var numWin=Math.max(1,Math.floor(w/3));
  for(var wi=0;wi<numWin;wi++){
    var wx=cx-w/2+w/(numWin+1)*(wi+1);
    if(Math.abs(wx-cx)<0.8&&zid!=="toilet")continue; // skip center for door
    BOX(0.9,0.7,0.06,mGlass,wx,0.3+wallH*0.55,cz-d/2-0.04);

/* ── Shade/net house ──────────────────────────────────── */
function shadeHouse(cx,cz,w,d,h,zid,label){
  // Concrete floor
  BOX(w,0.12,d,mConc,cx,0,cz,zid);
  // Steel column posts at corners + midpoints
  var cols=[];
  var xs=[-w/2,-w/4,0,w/4,w/2];
  var zs=[-d/2,d/2];
  xs.forEach(function(ox){zs.forEach(function(oz){
    var col=CYL(0.09,0.09,h,mSteel,cx+ox,0.12,cz+oz);
    cols.push(col);
    // Base plate
    BOX(0.25,0.06,0.25,M(null,"#6a7a6a",0.6,0.3),cx+ox,0.12,cz+oz);
    // Cap plate
    BOX(0.22,0.06,0.22,M(null,"#6a7a6a",0.6,0.3),cx+ox,0.12+h,cz+oz);
  });});
  // Purlins along Z
  for(var xi=0;xi<xs.length;xi++){
    addMesh(new T.BoxGeometry(0.06,0.06,d+0.1),mSteel,cx+xs[xi],0.12+h,cz);
  }
  // Purlins along X
  zs.forEach(function(oz){
    addMesh(new T.BoxGeometry(w+0.1,0.06,0.06),mSteel,cx,0.12+h,cz+oz);
  });
  // Ridge purlin
  addMesh(new T.BoxGeometry(w+0.1,0.08,0.08),mSteel,cx,0.12+h+0.04,cz);
  // Shade net roof (semitransparent)
  var netM=M(null,"#2d5a1a",0.5,0,{transparent:true,opacity:0.55,side:T.DoubleSide});
  addMesh(new T.BoxGeometry(w+0.1,0.04,d+0.1),netM,cx,0.12+h+0.02,cz,0,0,0,false);
  // Side shade netting (walls)
  var netWallM=M(null,"#3a6a22",0.5,0,{transparent:true,opacity:0.35,side:T.DoubleSide});
  addMesh(new T.BoxGeometry(w+0.1,h,0.04),netWallM,cx,0.12+h/2,cz-d/2,0,0,0,false);
  addMesh(new T.BoxGeometry(w+0.1,h,0.04),netWallM,cx,0.12+h/2,cz+d/2,0,0,0,false);
  // Seedling beds inside
  for(var bi=0;bi<5;bi++){
    var bz=cz-d/2+0.5+(bi*(d-0.8)/4);
    BOX(w-0.5,0.22,0.72,mSoil,cx,0.24,bz);

      SPH(0.1+Math.random()*0.04,M(null,"#5aac3a",0.78,0),px,0.7+Math.random()*0.05,bz);
    }
  }
  if(label)mkLabel(cx,0.12+h+0.8,cz,zid,label,"#a0ffa0");
}

/* ── Growing bed rows ─────────────────────────────────── */
function bedArea(cx,cz,w,d,bh,count,soilCol,zid,label){
  // Perimeter frame
  BOX(w,0.14,d,M(null,"#8a9060",0.88,0),cx,0,cz,zid);
  var bw=(w-0.3*(count+1))/count;
  for(var bi=0;bi<count;bi++){
    var bx=cx-w/2+0.3+bw/2+bi*(bw+0.3);
    // Bed walls (timber frame)
    BOX(bw,bh,d-0.2,M(null,"#4a2a0a",0.88,0),bx,0.14,cz);
    BOX(bw-0.16,bh-0.05,d-0.36,M(TX.soil,soilCol,0.94,0),bx,0.14+0.03,cz);

        var pz=cz-d/2+0.5+pi*1.0;
        var ph=0.16+Math.random()*0.18;
        CYL(0.035,0.028,ph,M(null,"#4aac2a",0.78,0),px,0.14+bh,pz,6);

      }
    }
  }
  if(label)mkLabel(cx,0.14+bh+0.7,cz,zid,label,"#a0ffa0");

/* ── Fencepost + rail ─────────────────────────────────── */
function postRail(x1,z1,x2,z2,postH,col){
  var pM=M(null,col||"#5a4a2a",0.7,0.05);
  var rM=M(null,col||"#6a5a3a",0.65,0.05);
  var ddx=x2-x1,ddz=z2-z1,len=Math.sqrt(ddx*ddx+ddz*ddz),steps=Math.ceil(len/2.5);
  for(var si=0;si<=steps;si++){var t=si/steps;CYL(0.1,0.1,postH,pM,x1+ddx*t,0,z1+ddz*t,8);}
  [0.55,postH*0.7].forEach(function(fy){
    var rm=new T.Mesh(new T.BoxGeometry(len,0.07,0.07),rM);
    rm.position.set((x1+x2)/2,fy,(z1+z2)/2);rm.rotation.y=-Math.atan2(ddz,ddx);rm.castShadow=true;scene.add(rm);
  });
}

/* ── Live hedge fence ──────────────────────────────────── */
function liveFence(x1,z1,x2,z2){
  var ddx=x2-x1,ddz=z2-z1,len=Math.sqrt(ddx*ddx+ddz*ddz),cnt=Math.ceil(len/1.4);
  var gcols=["#2e6a18","#2d7d32","#388e3c","#1b5e20"];
  for(var fi=0;fi<=cnt;fi++){
    var t=fi/cnt,fx=x1+ddx*t,fz=z1+ddz*t;
    var ph=1.8+Math.random()*0.9;
    CYL(0.12,0.08,ph,M(null,"#2e6a18",0.82,0),fx,0,fz,8);
    SPH(0.38+Math.random()*0.22,M(null,gcols[Math.floor(Math.random()*4)],0.82,0),fx,ph+0.18,fz);
  }
  // Barbed wire strands
  var wM=M(null,"#8a8a8a",0.4,0.7);
  [0.7,1.2,1.8].forEach(function(fy){
    var wm=new T.Mesh(new T.CylinderGeometry(0.018,0.018,len,6),wM);
    wm.position.set((x1+x2)/2,fy,(z1+z2)/2);wm.rotation.order="YZX";wm.rotation.z=Math.PI/2;wm.rotation.y=-Math.atan2(ddz,ddx);scene.add(wm);
  });
}

/* ── Tree ─────────────────────────────────────────────── */
function tree(tx,tz,s){
  var s2=s||1;

/* ── Label sprite ─────────────────────────────────────── */
function mkLabel(x,y,z,zid,name,bg){
  var cv=document.createElement("canvas");cv.width=300;cv.height=72;
  var ctx=cv.getContext("2d");
  ctx.fillStyle="rgba(0,0,0,.82)";rr(ctx,0,0,300,72,8);ctx.fill();
  ctx.strokeStyle=bg||"#d0ffa0";ctx.lineWidth=2.2;rr(ctx,1,1,298,70,8);ctx.stroke();
  ctx.fillStyle=bg||"#d0ffa0";ctx.font="bold 13px Arial";ctx.textAlign="center";ctx.textBaseline="middle";
  var words=name.split(" "),lines=[],cur="";
  words.forEach(function(w){var t=cur?cur+" "+w:w;if(ctx.measureText(t).width>260&&cur){lines.push(cur);cur=w;}else cur=t;});
  lines.push(cur);
  var ly=36-((lines.length-1)*9);
  lines.forEach(function(l){ctx.fillText(l,150,ly);ly+=18;});
  var sp=new T.Sprite(new T.SpriteMaterial({map:new T.CanvasTexture(cv),transparent:true,depthTest:false}));
  sp.position.set(x,y,z);sp.scale.set(6,1.55,1);
  scene.add(sp);labels.push(sp);
}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

/* ── Raycaster ────────────────────────────────────────── */
var rc=new T.Raycaster(),rcm=new T.Vector2(),rcdn={x:0,y:0};
wrap.addEventListener("pointerdown",function(e){rcdn.x=e.clientX;rcdn.y=e.clientY;});
wrap.addEventListener("pointerup",function(e){
  if(Math.abs(e.clientX-rcdn.x)>8||Math.abs(e.clientY-rcdn.y)>8)return;
  var rect=renderer.domElement.getBoundingClientRect();
  rcm.x=((e.clientX-rect.left)/rect.width)*2-1;rcm.y=-((e.clientY-rect.top)/rect.height)*2+1;
  rc.setFromCamera(rcm,camera);
  var hits=rc.intersectObjects(picks,false);
  if(hits.length&&hits[0].object.userData.zid)showInfo(hits[0].object.userData.zid);
  else document.getElementById("info").style.display="none";
});

wrap.addEventListener("wheel",function(e){e.preventDefault();cs.r=Math.max(8,Math.min(220,cs.r+e.deltaY*0.08));applyC();},{passive:false});
wrap.addEventListener("touchstart",function(e){if(e.touches.length===2)lpn=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);},{passive:true});
wrap.addEventListener("touchmove",function(e){if(e.touches.length===2){e.preventDefault();var pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);cs.r=Math.max(8,Math.min(220,cs.r-(pd-lpn)*0.15));lpn=pd;applyC();}},{passive:false});

/* ── Tabs ─────────────────────────────────────────────── */
var curV="3d";
document.querySelectorAll(".tab").forEach(function(tab){tab.addEventListener("click",function(){document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("on");});tab.classList.add("on");curV=tab.getAttribute("data-v");var vp=VIEWS[curV]||VIEWS["3d"];cs.theta=vp.theta;cs.phi=vp.phi;cs.r=vp.r;cs.px=vp.px;cs.pz=vp.pz;applyC();});});

/* ── Buttons ──────────────────────────────────────────── */
function wb(id,fn){document.getElementById(id).addEventListener("pointerdown",function(e){e.preventDefault();fn();});}
wb("bzi",function(){cs.r=Math.max(8,cs.r-6);applyC();});
wb("bzo",function(){cs.r=Math.min(220,cs.r+6);applyC();});
wb("brl",function(){cs.theta-=0.12;applyC();});
wb("brr",function(){cs.theta+=0.12;applyC();});
wb("btu",function(){cs.phi=Math.max(0.04,cs.phi-0.08);applyC();});
wb("btd",function(){cs.phi=Math.min(1.48,cs.phi+0.08);applyC();});
wb("brs",function(){var vp=VIEWS[curV]||VIEWS["3d"];cs.theta=vp.theta;cs.phi=vp.phi;cs.r=vp.r;cs.px=vp.px;cs.pz=vp.pz;applyC();});

var lblV=true;
document.getElementById("blb").addEventListener("pointerdown",function(e){e.preventDefault();lblV=!lblV;this.classList.toggle("on",lblV);labels.forEach(function(l){l.visible=lblV;});});

var sunAnim=true;
document.getElementById("bsun").addEventListener("pointerdown",function(e){e.preventDefault();sunAnim=!sunAnim;this.classList.toggle("on",sunAnim);});

window.addEventListener("resize",function(){var nw=wrap.clientWidth,nh=wrap.clientHeight;renderer.setSize(nw,nh);camera.aspect=nw/nh;camera.updateProjectionMatrix();});

/* ── Animate ──────────────────────────────────────────── */
var clk=new T.Clock();
(function loop(){
  requestAnimationFrame(loop);
  var el=clk.getElapsedTime();
  if(sunAnim){
    var ang=el*0.04;
    sun.position.set(Math.cos(ang)*60,45+Math.sin(ang*0.5)*15,Math.sin(ang)*30);
    sun.intensity=3.5+0.5*Math.sin(el*0.3);
  }
  renderer.render(scene,camera);
})();

}})();
</script>
</body>
</html>
